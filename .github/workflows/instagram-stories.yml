name: 📱 Instagram Stories

on:
  schedule:
    - cron: '0 9,21 * * *'  # 9 AM and 9 PM UTC (morning and evening)
  workflow_dispatch:

jobs:
  instagram-stories:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Dependencies
        run: npm install

      - name: Generate & Upload Instagram Stories
        run: node scripts/instagram-stories-producer.mjs
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          META_IG_ACCOUNT_ID: ${{ secrets.META_IG_ACCOUNT_ID }}

      - name: Commit State Updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/instagram-stories-state.json || true
          git diff --staged --quiet || git commit -m "chore: update instagram stories state [skip ci]"
          git pull --rebase origin main
          git push origin main
        continue-on-error: true
