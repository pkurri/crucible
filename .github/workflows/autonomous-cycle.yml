name: Crucible Autonomous Cycle

on:
  schedule:
    - cron: '0 */6 * * *' # Every 6 hours
  workflow_dispatch:

jobs:
  forge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: templates/006-crucible-web/package-lock.json

      - name: Install Dependencies
        run: |
          cd templates/006-crucible-web
          npm install

      - name: Run Forge Cycle
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          BROWSERLESS_API_KEY: ${{ secrets.BROWSERLESS_API_KEY }}
        run: |
          cd templates/006-crucible-web
          npx tsx src/workers/autonomous-forge.ts

      - name: Commit & Push Changes
        if: success()
        run: |
          git config --global user.name "Crucible Reactor"
          git config --global user.email "reactor@crucible.dev"
          git add .
          git commit -m "chore: autonomous repository expansion [skip ci]" || echo "No changes to commit"
          git push
