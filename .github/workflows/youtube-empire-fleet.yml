name: YouTube Empire Fleet Production

on:
  schedule:
    - cron: '0 */12 * * *' # Every 12 hours
  workflow_dispatch: # Manual trigger

jobs:
  production-cycle:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Crucible Core
        uses: actions/checkout@v4

      - name: Setup Node Forge
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Industrial Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          npm install --include=dev

      - name: Injection: YouTube Credentials
        run: |
          echo '${{ secrets.YOUTUBE_CLIENT_SECRET }}' > client_secret.json
          echo '${{ secrets.YOUTUBE_TOKEN_JSON }}' > youtube-token.json

      - name: Launch Empire production-cycle
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: node scripts/youtube-empire-loop.mjs
