name: '🔱 AAK Nation YouTube Empire Fleet'

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:

jobs:
  produce-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Node Dependencies
        run: npm install

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Edge TTS
        run: pip install edge-tts

      - name: Setup YouTube Credentials

        run: |
          echo '${{ secrets.YOUTUBE_CLIENT_SECRET }}' > client_secret.json
          echo '${{ secrets.YOUTUBE_TOKEN_JSON }}' > youtube-token.json

      - name: Create Data Structure
        run: mkdir -p data/youtube-empire/AAK-Nation/topics

      - name: Discover Daily Viral Niche
        run: node scripts/niche-strategist.mjs
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

      - name: Architect Viral Scripts
        run: node scripts/viral-script-architect.mjs
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

      - name: Run Empire Production Loop
        run: node scripts/youtube-empire-loop.mjs
        env:
          GITHUB_ACTIONS: "true"
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          NODE_ENV: production

      - name: Verify YouTube Upload
        if: always()
        run: node scripts/youtube-official-uploader.mjs --verify
        continue-on-error: true

      - name: Commit Status Update
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "Crucible Bot"
          git config --global user.email "bot@crucible.ai"
          git add -f data/youtube-empire/ scripts/yt-empire-state.json data/viral-niches.json data/viral-scripts.json || true
          git diff --staged --quiet || git commit -m "chore: update youtube upload cycle [skip ci]"
          git pull --rebase origin main || true
          git push origin main || echo "Push failed"
