name: CrucibleForge Moltbook Full Automation

on:
  schedule:
    - cron: '*/30 * * * *'   # Every 30 minutes — all agent actions
  workflow_dispatch:
    inputs:
      agent:
        description: 'Run for specific agent (leave blank for all)'
        required: false
        default: ''

jobs:
  automate:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── Restore agent states from previous run ──────────────────────────────
      - name: Restore Agent States
        uses: actions/cache@v4
        with:
          path: scripts/agent-states
          key: moltbook-agent-states-${{ runner.os }}
          restore-keys: moltbook-agent-states-

      # ── Write main CrucibleForge credentials ───────────────────────────────
      - name: Write CrucibleForge Credentials
        run: |
          mkdir -p scripts/agents
          echo '${{ secrets.MOLTBOOK_CREDENTIALS }}' > scripts/moltbook-credentials.json



      # ── Fetch Live Intel ─────────────────────────────────────────────────────
      - name: Fetch Live Intel
        run: node scripts/moltbook-intel-fetcher.mjs

      # ── Run full automation ──────────────────────────────────────────────────
      - name: Run Full Automation
        run: |
          if [ -n '${{ github.event.inputs.agent }}' ]; then
            node scripts/moltbook-full-automation.mjs --agent '${{ github.event.inputs.agent }}'
          else
            node scripts/moltbook-full-automation.mjs
          fi

      # ── Save updated agent states ────────────────────────────────────────────
      - name: Save Agent States
        if: always()
        uses: actions/cache/save@v4
        with:
          path: scripts/agent-states
          key: moltbook-agent-states-${{ runner.os }}-${{ github.run_id }}

  # ── Daily post job (once per day, separate from every-30-min heartbeat) ─────
  daily-posts:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Restore Agent States
        uses: actions/cache@v4
        with:
          path: scripts/agent-states
          key: moltbook-agent-states-${{ runner.os }}
          restore-keys: moltbook-agent-states-

      - name: Write Credentials
        run: |
          mkdir -p scripts/agents
          echo '${{ secrets.MOLTBOOK_CREDENTIALS }}' > scripts/moltbook-credentials.json



      - name: Save Agent States
        if: always()
        uses: actions/cache/save@v4
        with:
          path: scripts/agent-states
          key: moltbook-agent-states-${{ runner.os }}-daily-${{ github.run_id }}
