name: 🎬 YouTube Shorts Enhancement

on:
  schedule:
    - cron: '0 */8 * * *'  # Every 8 hours
  workflow_dispatch:

jobs:
  enhance-shorts:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Dependencies
        run: npm install

      - name: Enhance YouTube Shorts
        run: node scripts/youtube-shorts-enhancer.mjs

      - name: Commit Enhanced Videos
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/youtube-empire/*/topics/*/enhanced.json || true
          git diff --staged --quiet || git commit -m "chore: enhance YouTube Shorts with subscribe overlays [skip ci]"
          git pull --rebase origin main
          git push origin main
        continue-on-error: true
