name: '🌌 Akasha Glimpse YouTube Automation'

on:
  schedule:
    - cron: '0 10 * * *'  # Runs daily at 10 AM UTC
  workflow_dispatch:

jobs:
  produce-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Node Dependencies
        run: npm install

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Edge TTS
        run: pip install edge-tts

      - name: Initialize YouTube API Keys
        run: |
          echo '${{ secrets.YOUTUBE_CLIENT_SECRET }}' > client_secret.json
          echo '${{ secrets.YOUTUBE_TOKEN_AKASHA_JSON }}' > youtube-token-akasha.json

      - name: Create Data Structure
        run: mkdir -p data/instagram-empire/AkashaGlimpse/topics

      - name: Run Akasha Glimpse Autonomous Loop
        run: node scripts/youtube-akasha-loop.mjs
        env:
          GITHUB_ACTIONS: "true"
          NODE_ENV: production

      - name: Commit Status Update
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "Crucible Bot"
          git config --global user.email "bot@crucible.ai"
          git add -f data/instagram-empire/AkashaGlimpse/ scripts/ data/viral-metadata.json || true
          git diff --staged --quiet || git commit -m "chore: akasha glimpse video released [skip ci]"
          git pull --rebase origin main || true
          git push origin main || echo "Push failed"
