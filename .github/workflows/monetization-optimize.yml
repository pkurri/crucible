name: Crucible Monetization Optimizer

on:
  schedule:
    - cron: '0 0 * * *' # Once a day at midnight
  workflow_dispatch:

jobs:
  optimize:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: templates/006-crucible-web/package-lock.json

      - name: Install Dependencies
        run: |
          cd templates/006-crucible-web
          npm install

      - name: Run Revenue Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SAMBANOVA_API_KEY: ${{ secrets.SAMBANOVA_API_KEY }}
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cd templates/006-crucible-web
          npx tsx src/workers/revenue-agent.ts

      - name: Commit & Push Changes
        if: success()
        run: |
          git config --global user.name "Crucible AI"
          git config --global user.email "ai@crucible.dev"
          git add templates/006-crucible-web/data/
          git commit -m "chore: ai-optimized monetization strategy [skip ci]" || echo "No strategy changes to commit"
          git push
