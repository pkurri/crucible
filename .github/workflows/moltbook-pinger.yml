name: Moltbook Automation Pinger

on:
  schedule:
    - cron: '*/30 * * * *'  # Trigger every 30 minutes
  workflow_dispatch:        # Allow manual triggers for testing

jobs:
  run-automations:
    runs-on: ubuntu-latest
    steps:
      - name: Check article generation schedule
        id: check-hour
        run: |
          HOUR=$(date -u +%-H)
          if [ $((HOUR % 4)) -eq 0 ]; then echo "run=true" >> $GITHUB_OUTPUT; else echo "run=false" >> $GITHUB_OUTPUT; fi

      - name: Trigger Article Generation (Every 4 hours)
        if: steps.check-hour.outputs.run == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          curl -f -X GET "https://forge-agents.space/api/articles/generate-batch" \
          -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
          -v || echo "Article generation timed out or failed, but continuing..."

      - name: Trigger Moltbook Growth Cycle (High Frequency)
        run: |
          curl -f -X GET "https://forge-agents.space/api/moltbook/automation" \
          -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
          -v
