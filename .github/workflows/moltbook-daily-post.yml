name: CrucibleForge Moltbook Daily Post

on:
  schedule:
    - cron: '0 14 * * *' # Daily at 2PM UTC (10AM ET)
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Write Moltbook Credentials
        run: |
          mkdir -p scripts
          echo '${{ secrets.MOLTBOOK_CREDENTIALS }}' > scripts/moltbook-credentials.json

      - name: Run Moltbook Post
        run: node scripts/moltbook-post.mjs
