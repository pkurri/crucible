name: '📸 AAK Nation Meta Empire Fleet'

on:
  schedule:
    - cron: '0 */4 * * *'  # Every 4 hours
  workflow_dispatch:

jobs:
  meta-production:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Edge TTS
        run: pip install edge-tts

      - name: Create Data Structure
        run: |
          mkdir -p data/meta-empire/AAK-Nation/topics/BioHarmonize/assets
          mkdir -p data/meta-empire/AAK-Nation/topics/BioHarmonize/uploaded

      - name: Run Meta Empire Loop
        run: node scripts/meta-empire-loop.mjs
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          META_IG_ACCOUNT_ID: ${{ secrets.META_IG_ACCOUNT_ID }}
          META_FB_PAGE_ID: ${{ secrets.META_FB_PAGE_ID }}
          NODE_ENV: production
          GITHUB_ACTIONS: "true"

      - name: Commit Status Update
        if: always()
        run: |
          git config --global user.name "Crucible Bot"
          git config --global user.email "bot@crucible.ai"
          git add data/meta-empire/ scripts/meta-empire-state.json
          git commit -m "chore: update meta upload cycle [skip ci]" || echo "No changes to commit"
          git push || echo "Push failed"
