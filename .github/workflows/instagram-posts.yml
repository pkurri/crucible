name: 📸 Instagram Carousel Posts

on:
  schedule:
    - cron: '15 */6 * * *'  # Every 6 hours, offset from Reels
  workflow_dispatch:

jobs:
  instagram-posts:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Generate & Upload Instagram Carousel Posts
        run: node scripts/instagram-carousel-producer.mjs
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          META_IG_ACCOUNT_ID: ${{ secrets.META_IG_ACCOUNT_ID }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}

      - name: Commit State Updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/instagram-carousel-state.json || true
          git diff --staged --quiet || git commit -m "chore: update instagram carousel state [skip ci]"
          git pull --rebase origin main
          git push origin main
        continue-on-error: true
